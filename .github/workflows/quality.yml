name: Quality Check

on:
  push:
    branches: [def2.0, master]
  pull_request:
    branches: [master]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, gd, zip, pdo_mysql, pdo_sqlite
          coverage: none
          tools: composer:v2
        continue-on-error: false

      - name: Setup PHP SNMP extension (optional)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: snmp
          coverage: none
        continue-on-error: true

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --no-scripts --prefer-dist

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Pint format check (warning, non-blocking)
        run: composer format-test
        continue-on-error: true

      - name: PHPStan analyse (strict, blocking)
        run: composer stan

      - name: Unit tests (warning, non-blocking)
        run: php artisan test --testsuite=Unit
        continue-on-error: true
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
